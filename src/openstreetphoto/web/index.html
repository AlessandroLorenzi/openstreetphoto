<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>openstreetphoto — foto d'Italia</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500&family=IBM+Plex+Mono:wght@400;500&display=swap">
<style>
  :root {
    --paper: #FBFAF7;
    --ink: #23272C;
    --ink-soft: #4A5058;
    --ochre: #C2410C;
    --matte: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #map { height: 100%; }
  body { font-family: "IBM Plex Mono", monospace; background: var(--paper); color: var(--ink); }

  /* contafotogrammi */
  #counter {
    position: fixed; top: 12px; right: 12px; z-index: 1000;
    background: var(--ink); color: var(--paper);
    font: 500 13px/1 "IBM Plex Mono", monospace;
    letter-spacing: 0.08em;
    padding: 8px 12px; border-radius: 2px;
  }
  #counter b { color: #F0B27A; font-weight: 500; }

  /* cluster monocromi: cerchio inchiostro, numero bianco */
  .osp-cluster {
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--paper);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font: 500 12px "IBM Plex Mono", monospace;
    box-shadow: 0 1px 4px rgba(35,39,44,.4);
  }

  /* modale-stampa */
  #overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(35,39,44,.72);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  #overlay.open { display: flex; }
  #print {
    position: relative;
    background: var(--matte);
    padding: 14px 14px 0;
    max-width: min(760px, 94vw); max-height: 92vh;
    box-shadow: 0 12px 40px rgba(0,0,0,.45);
    display: flex; flex-direction: column;
  }
  @media (prefers-reduced-motion: no-preference) {
    #overlay.open #print { animation: develop .18s ease-out; }
    @keyframes develop { from { opacity: 0; transform: scale(.97); } }
  }
  #photo-box {
    min-height: 200px; max-height: calc(92vh - 120px);
    display: flex; align-items: center; justify-content: center;
    background: #EFEDE8;
  }
  #photo-box img { max-width: 100%; max-height: calc(92vh - 120px); display: block; }
  #photo-error {
    padding: 48px 32px; color: var(--ink-soft);
    font-size: 13px; text-align: center;
  }
  #caption {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 16px; padding: 12px 2px 14px;
  }
  #caption h2 {
    font: italic 500 21px/1.2 "Fraunces", serif;
    color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #caption .meta {
    font: 400 12px "IBM Plex Mono", monospace;
    color: var(--ink-soft); white-space: nowrap;
  }
  #caption a { color: var(--ochre); text-decoration: none; }
  #caption a:hover, #caption a:focus-visible { text-decoration: underline; }
  #print-description {
    margin: -6px 2px 14px;
    font: 400 12px/1.5 "IBM Plex Mono", monospace;
    color: var(--ink-soft);
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 4;
    line-clamp: 4;
    overflow: hidden;
  }
  #print-description[hidden] { display: none; }
  #close {
    position: absolute; top: -12px; right: -12px;
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--matte);
    font: 500 14px/1 "IBM Plex Mono", monospace;
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  }
  :focus-visible { outline: 2px solid var(--ochre); outline-offset: 2px; }
</style>
</head>
<body>
<div id="map"></div>
<div id="counter">caricamento…</div>
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="print-title" aria-describedby="print-description">
  <figure id="print">
    <button id="close" aria-label="Chiudi">✕</button>
    <div id="photo-box"></div>
    <figcaption id="caption">
      <h2 id="print-title"></h2>
      <span class="meta"><a id="source" target="_blank" rel="noopener"></a> · <a id="osm-link" target="_blank" rel="noopener">vedi su OSM →</a></span>
    </figcaption>
    <p id="print-description" hidden></p>
  </figure>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  "use strict";

  // molti tag image= non sono URL diretti di immagini: pagine File: di Commons o
  // delle Wikipedia, valori nudi File:..., vecchi thumbnail che oggi rispondono 400.
  // parseWikiImage riconosce questi casi e ritorna host e filename (URL-encoded).
  function parseWikiImage(url) {
    const filePage = url.match(
      /^(https?:\/\/[a-z-]+\.(?:m\.)?(?:wikimedia|wikipedia)\.org)\/wiki\/File:(.+)$/
    );
    if (filePage) {
      return { host: filePage[1], name: filePage[2] };
    }
    if (url.startsWith("File:")) {
      return {
        host: "https://commons.wikimedia.org",
        name: encodeURIComponent(url.slice(5)),
      };
    }
    const thumb = url.match(
      /^https?:\/\/upload\.wikimedia\.org\/wikipedia\/commons\/thumb\/\w\/\w\w\/([^/]+)\//
    );
    if (thumb) {
      return { host: "https://commons.wikimedia.org", name: thumb[1] };
    }
    return null;
  }

  // riscrive su Special:FilePath, che risolve sempre il file corrente
  function normalizeImageUrl(url) {
    const wiki = parseWikiImage(url);
    if (!wiki) return url;
    return wiki.host + "/wiki/Special:FilePath/" + wiki.name + "?width=1024";
  }

  // da filename a titolo: decode, via estensione, underscore -> spazi.
  // null se somiglia a un nome generato da fotocamera/app (meglio "Nodo ..."
  // che "IMG 20230512 101530").
  function humanTitle(fileName) {
    let name;
    try {
      name = decodeURIComponent(fileName);
      name = name.replace(/_/g, " ");
    } catch {
      name = fileName; // valore raw con % literale: non decodificabile, lasciato com'e'
    }
    name = name.replace(/\.(jpe?g|png|webp|gif|tiff?|svg)$/i, "").trim();
    if (/^(IMG|DSC[NF]?|P\d|PXL|DJI|GOPR|Screenshot|WhatsApp Image)[ _-]?\d/i.test(name)) {
      return null;
    }
    if (/^[\d\s\-.]*$/.test(name)) return null; // solo cifre/date/timestamp, o vuoto
    return name;
  }

  // titolo di fallback per i nodi senza name, dal filename della foto
  function photoTitle(tags) {
    if (tags.wikimedia_commons && tags.wikimedia_commons.startsWith("File:")) {
      const t = humanTitle(tags.wikimedia_commons.slice(5));
      if (t) return t;
    }
    if (tags.image) {
      const wiki = parseWikiImage(tags.image);
      if (wiki) return humanTitle(wiki.name);
    }
    return null;
  }

  // titolo di fallback dal tag tipo del nodo (es. "drinking_water" -> "Drinking water").
  // La lista sta dentro la funzione: l'harness dei test estrae una funzione sola.
  function typeTitle(tags) {
    for (const key of ["amenity", "shop", "tourism", "historic", "leisure", "man_made"]) {
      const value = tags[key];
      if (value && value !== "yes") {
        const label = value.replace(/_/g, " ");
        return label.charAt(0).toUpperCase() + label.slice(1);
      }
    }
    return null;
  }

  // tutte le sorgenti embeddabili del nodo, in ordine di priorità
  function photoCandidates(props) {
    const tags = props.tags;
    const candidates = [];
    if (props.photo_keys.includes("image")) {
      candidates.push({
        url: normalizeImageUrl(tags.image),
        source: "image",
        page: tags.image,  // pagina/URL originale del tag, non la versione riscritta
      });
    }
    if (props.photo_keys.includes("wikimedia_commons")) {
      const name = tags.wikimedia_commons.replace(/^File:/, "");
      candidates.push({
        url: "https://commons.wikimedia.org/wiki/Special:FilePath/" +
             encodeURIComponent(name) + "?width=1024",
        source: "wikimedia commons",
        page: "https://commons.wikimedia.org/wiki/File:" + encodeURIComponent(name),
      });
    }
    if (props.photo_keys.includes("panoramax")) {
      candidates.push({
        url: "https://api.panoramax.xyz/api/pictures/" + tags.panoramax + "/sd.jpg",
        source: "panoramax",
        page: "https://api.panoramax.xyz/#focus=pic&pic=" + tags.panoramax,
      });
    }
    return candidates;
  }

  // costruisce l'URL Nominatim: query URL-encoded, viewbox dai bounds
  // correnti (W,S,E,N), bounded=1 per restare dentro la zona visualizzata
  function buildSearchUrl(query, west, south, east, north) {
    const viewbox = west + "," + south + "," + east + "," + north;
    return "https://nominatim.openstreetmap.org/search?format=json&limit=5" +
      "&bounded=1&q=" + encodeURIComponent(query) +
      "&viewbox=" + encodeURIComponent(viewbox);
  }

  // Nominatim: boundingbox = [south, north, west, east] di stringhe.
  // Ritorna [[south, west], [north, east]] per map.fitBounds.
  function resultToBounds(result) {
    const b = result.boundingbox;
    return [[parseFloat(b[0]), parseFloat(b[2])], [parseFloat(b[1]), parseFloat(b[3])]];
  }

  const overlay = document.getElementById("overlay");
  const photoBox = document.getElementById("photo-box");
  const title = document.getElementById("print-title");
  const description = document.getElementById("print-description");
  const source = document.getElementById("source");
  const osmLink = document.getElementById("osm-link");
  const closeBtn = document.getElementById("close");

  function showCandidate(candidates, i) {
    if (i >= candidates.length) {
      photoBox.innerHTML = '<p id="photo-error">La foto non si carica da nessuna sorgente.<br>Il link OSM qui sotto resta valido.</p>';
      return;
    }
    source.textContent = candidates[i].source;
    source.href = candidates[i].page;
    photoBox.innerHTML = "";
    const img = document.createElement("img");
    img.alt = title.textContent;
    img.onerror = () => showCandidate(candidates, i + 1);  // prova la sorgente successiva
    img.src = candidates[i].url;
    photoBox.appendChild(img);
  }

  function parseHash() {
    const params = new URLSearchParams(location.hash.slice(1));
    const out = {};
    if (params.get("node")) out.node = parseInt(params.get("node"), 10);
    const m = (params.get("map") || "").match(/^([\d.]+)\/(-?[\d.]+)\/(-?[\d.]+)$/);
    if (m) out.map = { zoom: +m[1], lat: +m[2], lon: +m[3] };
    return out;
  }

  function writeHash(nodeId, lat, lon) {
    const pos = map.getZoom() + "/" + lat.toFixed(6) + "/" + lon.toFixed(6);
    history.replaceState(null, "", nodeId ? "#node=" + nodeId + "&map=" + pos : "#map=" + pos);
  }

  let currentNodeId = null;  // nodo della modale aperta, riportato nell'hash a ogni moveend

  function openModal(feature) {
    const props = feature.properties;
    const candidates = photoCandidates(props);
    if (!candidates.length) return;
    currentNodeId = props.osm_id;
    title.textContent =
      props.tags.name || typeTitle(props.tags) || photoTitle(props.tags) ||
      "Nodo " + props.osm_id;
    const descText = (props.tags.description || "").trim();
    description.textContent = descText;
    description.hidden = !descText;
    osmLink.href = "https://www.openstreetmap.org/node/" + props.osm_id;
    showCandidate(candidates, 0);
    overlay.classList.add("open");
    closeBtn.focus();
    const [lon, lat] = feature.geometry.coordinates;
    writeHash(props.osm_id, lat, lon);
  }

  function closeModal() {
    if (!overlay.classList.contains("open")) return;
    overlay.classList.remove("open");
    photoBox.innerHTML = "";
    currentNodeId = null;
    const c = map.getCenter();
    writeHash(null, c.lat, c.lng);
  }
  closeBtn.addEventListener("click", closeModal);
  overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });

  const initialHash = parseHash();
  const map = initialHash.map
    ? L.map("map").setView([initialHash.map.lat, initialHash.map.lon], initialHash.map.zoom)
    : L.map("map").setView([42.5, 12.5], 6);
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  }).addTo(map);

  // ogni spostamento aggiorna map= nell'hash (e conserva node= se la modale è aperta)
  map.on("moveend", () => {
    const c = map.getCenter();
    writeHash(currentNodeId, c.lat, c.lng);
  });

  const clusters = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 46,
    chunkedLoading: true,  // inserisce i ~35k marker a blocchi: non blocca il main thread al load
    removeOutsideVisibleBounds: true,  // tiene nel DOM solo i marker nel viewport
    iconCreateFunction: (cluster) => {
      const n = cluster.getChildCount();
      const size = n < 10 ? 30 : n < 100 ? 38 : 46;
      return L.divIcon({
        html: '<div class="osp-cluster" style="width:' + size + "px;height:" + size + 'px">' + n + "</div>",
        className: "",
        iconSize: [size, size],
      });
    },
  });

  const EMBEDDABLE = ["image", "wikimedia_commons", "panoramax"];

  fetch("photo-nodes.geojson")  // relativo: funziona sia su osp-serve sia su GitHub Pages (/repo/)
    .then((r) => r.json())
    .then((doc) => {
      const feats = doc.features.filter((f) =>
        f.properties.photo_keys.some((k) => EMBEDDABLE.includes(k))
      );
      const byId = new Map();
      for (const f of feats) {
        byId.set(f.properties.osm_id, f);
        const [lon, lat] = f.geometry.coordinates;
        const marker = L.circleMarker([lat, lon], {
          radius: 6, weight: 2,
          color: "#C2410C", fillColor: "#FBFAF7", fillOpacity: 0.9,
        });
        marker.on("click", () => openModal(f));
        clusters.addLayer(marker);
      }
      map.addLayer(clusters);
      document.getElementById("counter").innerHTML =
        "<b>" + feats.length.toLocaleString("it-IT") + "</b> foto";
      // permalink: #node=… riapre la modale sul nodo
      if (initialHash.node && byId.has(initialHash.node)) {
        const f = byId.get(initialHash.node);
        if (!initialHash.map) {
          const [lon, lat] = f.geometry.coordinates;
          map.setView([lat, lon], 18);
        }
        openModal(f);
      }
    })
    .catch(() => {
      document.getElementById("counter").textContent = "errore nel caricare i punti";
    });
</script>
</body>
</html>
