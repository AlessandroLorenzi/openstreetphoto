name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true  # Pages branch-based non serve i contenuti LFS: il sito va assemblato qui

      - name: Assembla il sito
        run: |
          mkdir -p _site
          cp src/openstreetphoto/web/index.html _site/
          cp data/photo-nodes.geojson _site/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v5
